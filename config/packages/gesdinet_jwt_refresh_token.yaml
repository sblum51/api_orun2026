gesdinet_jwt_refresh_token:
    # Refresh token model + manager backed by Doctrine ORM
    refresh_token_class: App\Entity\RefreshToken

    # 30 days lifetime — adjust if needed
    ttl: 2592000

    # When the user successfully refreshes, issue a brand-new refresh token
    # (sliding window) and invalidate the old one
    single_use: true

    # Update the refresh token's TTL each time it is used, so an active user
    # never needs to log back in
    ttl_update: true
