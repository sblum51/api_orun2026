# yaml-language-server: $schema=../vendor/symfony/dependency-injection/Loader/schema/services.schema.json

# This file is the entry point to configure your own services.
# Files in the packages/ subdirectory configure your dependencies.
# See also https://symfony.com/doc/current/service_container/import.html

# Put parameters here that don't need to change on each machine where the app is deployed
# https://symfony.com/doc/current/best_practices.html#use-parameters-for-application-configuration
parameters:
    default_apns_env: 'production'

services:
    # default configuration for services in *this* file
    _defaults:
        autowire: true      # Automatically injects dependencies in your services.
        autoconfigure: true # Automatically registers your services as commands, event subscribers, etc.

    # makes classes in src/ available to be used as services
    # this creates a service per class whose id is the fully-qualified class name
    App\:
        resource: '../src/'

    # MapStorage delegates to a Flysystem storage. The bound service id comes from
    # env var MAP_STORAGE_SERVICE: set it to `map.storage.s3` in production after
    # configuring AWS_REGION / AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY /
    # MAP_STORAGE_BUCKET (and MAP_STORAGE_ENDPOINT for OVH). Default is local disk.
    App\Service\MapStorage:
        arguments:
            $storage: '@map.storage.local'
            $publicUrlPrefix: '%env(default::MAP_STORAGE_PUBLIC_URL)%'

    # Push notifiers — FCM (Android) + APNs (iOS). Credentials come from
    # env vars, see .env for defaults / expected shape. Missing creds
    # cause the client to throw at send() time; upstream endpoints catch
    # and continue so a misconfigured push server doesn't 500 the API.
    App\Service\FcmPushClient:
        arguments:
            $serviceAccountJsonPath: '%env(FCM_SERVICE_ACCOUNT_JSON)%'
            $overrideProjectId: '%env(default::FCM_PROJECT_ID)%'

    App\Service\ApnsPushClient:
        arguments:
            $authKeyPath: '%env(APNS_AUTH_KEY_PATH)%'
            $keyId: '%env(APNS_KEY_ID)%'
            $teamId: '%env(APNS_TEAM_ID)%'
            $bundleId: '%env(APNS_BUNDLE_ID)%'
            # Unset env => production. Set to `sandbox` while testing
            # with a debug build installed via Xcode.
            $environment: '%env(default:default_apns_env:APNS_ENVIRONMENT)%'
